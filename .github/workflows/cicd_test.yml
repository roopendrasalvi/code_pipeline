name: Code Coverage Check

on:
  push:
    branches:
      - '**' 

jobs:
 lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 fpdf

      - name: Run flake8 linting
        run: |
          # Fail if any linting errors are found
          flake8 . | tee lint.log

      - name: Convert lint log to PDF
        if: always()
        run: |
            python - <<EOF
            from fpdf import FPDF

            pdf = FPDF()
            pdf.add_page()
            pdf.set_font("Arial", "B", 16)
            pdf.cell(0, 10, "Lint Report", ln=True, align="C")
            pdf.ln(10)

            pdf.set_font("Courier", size=10)
            with open("lint.log") as f:
                for line in f:
                    pdf.multi_cell(0, 10, line.strip())

            pdf.output("lint-report.pdf")
            EOF

      - name: Upload lint pdf
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: lint-report.pdf

 type-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install type checker
        run: |
          python -m pip install --upgrade pip
          pip install mypy fpdf

      - name: Run mypy type checking
        run: |
          mypy main.py  | tee type-check.log

      - name: Convert type-check log to PDF
        if: always()
        run: |
            python - <<EOF
            from fpdf import FPDF

            pdf = FPDF()
            pdf.add_page()
            pdf.set_font("Arial", "B", 16)
            pdf.cell(0, 10, "Type Check", ln=True, align="C")
            pdf.ln(10)

            pdf.set_font("Courier", size=10)
            with open("type-check.log") as f:
                for line in f:
                    pdf.multi_cell(0, 10, line.strip())

            pdf.output("type-check.pdf")
            EOF

      - name: Upload type-check pdf
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: type-check
          path: type-check.pdf

 pre-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pre-commit and radon
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit radon fpdf

      - name: Run pre-commit hooks
        run: pre-commit run --all-files | tee pre-commit.log

      - name: Convert pre-commit log to PDF
        if: always()
        run: |
            python - <<EOF
            from fpdf import FPDF

            pdf = FPDF()
            pdf.add_page()
            pdf.set_font("Arial", "B", 16)
            pdf.cell(0, 10, "Pre-Commit", ln=True, align="C")
            pdf.ln(10)

            pdf.set_font("Courier", size=10)
            with open("pre-commit.log") as f:
                for line in f:
                    pdf.multi_cell(0, 10, line.strip())

            pdf.output("pre-commit.pdf")
            EOF

      - name: Upload pre-commit pdf
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pre-commit
          path: pre-commit.pdf

 solid-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install solid-checker jq fpdf

      - name: Run Solid-Checker
        run: |
          set PYTHONUTF8=1          
          solid-checker --report main.py --json > solid_report.json

      - name: Run Solid-Checker and Evaluate Score
        run: |
          OUTPUT=$(solid-checker --report main.py)
          echo "$OUTPUT"

          # Extract the numeric part of "Overall SOLID Score: 1.00/1.00"
          SCORE=$(solid-checker --report main.py | awk -F' ' '/Overall SOLID Score/ {print $5}' | cut -d'/' -f1)
          echo "Extracted Overall SOLID SCORE: $SCORE"

          # Compare against threshold (70%)
          SCORE_INT=$(echo "$SCORE*100" | bc | cut -d'.' -f1)

          if [ "$SCORE_INT" -gt 70 ]; then
            echo "✅ Code quality acceptable, continuing pipeline."
          else
            echo "❌ Code quality score too low: $SCORE"
            echo "Generating report..."
            echo "$OUTPUT"
            exit 1
          fi

    #   - name: Convert solid-checker log to PDF
    #     if: always()
    #     run: |
    #         python - <<EOF
    #         from fpdf import FPDF

    #         pdf = FPDF()
    #         pdf.add_page()
    #         pdf.set_font("Arial", "B", 16)
    #         pdf.cell(0, 10, "Solid-Checker", ln=True, align="C")
    #         pdf.ln(10)

    #         pdf.set_font("Courier", size=10)
    #         with open("solid-checker.log") as f:
    #             for line in f:
    #                 pdf.multi_cell(0, 10, line.strip())

    #         pdf.output("solid-checker.pdf")
    #         EOF

    #   - name: Upload solid-checker pdf
    #     if: always()
    #     uses: actions/upload-artifact@v4
    #     with:
    #       name: solid-checker
    #       path: solid-checker.pdf

      - name: Generate PDF Report
        if: always()   
        run: |
            echo "Generating PDF report..."
            solid-checker --report main.py > solid_report.pdf

      - name: Upload PDF Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
            name: solid-checker-report
            path: solid_report.pdf